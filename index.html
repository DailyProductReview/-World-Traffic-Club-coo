<!-- Use JavaScript to randomly select 20-30 cookies -->
<script>
// List of ALL your affiliate IDs
var affiliateIds = [
    'g7r106k', 'vlhm568', 'm47m24g', /* ... all 170 IDs */ 
];

// Randomly select 25
var selected = [];
while(selected.length < 25) {
    var randomId = affiliateIds[Math.floor(Math.random() * affiliateIds.length)];
    if(!selected.includes(randomId)) selected.push(randomId);
}

// Load only selected cookies
selected.forEach(function(id) {
    var script = document.createElement('script');
    script.src = 'https://pjs.leadsleap.net/cookie.js?n=affiliate_id&v=' + id + '&t=31104000&p=&s=0';
    document.head.appendChild(script);
});
</script>
